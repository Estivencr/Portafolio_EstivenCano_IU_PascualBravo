<footer class="site-footer">
  <div class="container d-flex flex-column flex-md-row
              justify-content-between align-items-start
              align-items-md-center gap-3">
    <div>
      <div class="text-muted" style="font-size:12px;letter-spacing:1px;">
        {{ page.footer_label | default: site.title }} &nbsp;·&nbsp; {{ site.semestre }}
      </div>
      <div class="footer-sig">Portafolio Estiven Cano ✦</div>
    </div>
    <a href="{{ page.footer_link_url | default: '/' | relative_url }}" class="footer-link">
      {{ page.footer_link_text | default: "← Inicio" }}
    </a>
  </div>
</footer>
